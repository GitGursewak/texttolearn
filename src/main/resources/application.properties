spring.application.name=text-to-learn
spring.config.import=optional:file:.env[.properties]

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# Logging - helps with debugging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY}
openai.api.url=https://api.groq.com/openai/v1/chat/completions
openai.model=llama-3.3-70b-versatile

# YouTube Data v3 API Configuration
youtube.api.key=${YT_DATA_API_KEY}
youtube.api.url=https://www.googleapis.com/youtube/v3

# Supabase Auth Configuration
supabase.jwks.uri=${SUPABASE_JWKS_URI}
supabase.jwks.local-key=${SUPABASE_LOCAL_JWK:}
app.env=${APP_ENV:dev}

# GCP Pub/Sub Configuration
spring.cloud.gcp.project-id=${GCP_PROJECT_ID}
spring.cloud.gcp.credentials.encoded-key=${GCP_CREDENTIALS_ENCODED:}